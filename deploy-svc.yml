---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ksrtc-deployment
  labels:
    env: prod
    project: ksrtc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ksrtc
  template:
    metadata:
      labels:
        app: ksrtc
        env: prod
        project: ksrtc
    spec:
      containers:
      - name: ksrtc-container
        image: ruchithaag/ksrtc
        imagePullPolicy: Always
        ports:
        - containerPort: 8085

---
apiVersion: v1
kind: Service
metadata:
  name: ksrtc-service
  labels:
    env: prod
    project: ksrtc
spec:
  type: NodePort
  selector:
    app: ksrtc
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8085
      nodePort: 30080